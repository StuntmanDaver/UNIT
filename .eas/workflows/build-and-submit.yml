name: Production Build and Submit

on:
  tag:
    pattern: "v*"

jobs:
  build_ios:
    name: Build iOS (Production)
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android (Production)
    type: build
    params:
      platform: android
      profile: production

  submit_ios:
    name: Submit iOS to App Store
    type: submit
    needs: [build_ios]
    params:
      store: apple
      build_id: ${{ needs.build_ios.outputs.build_id }}

  submit_android:
    name: Submit Android to Google Play
    type: submit
    needs: [build_android]
    params:
      store: google_play
      build_id: ${{ needs.build_android.outputs.build_id }}

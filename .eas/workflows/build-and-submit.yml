name: Production Build and Store Distribution

on:
  push:
    tags:
      - v*

jobs:
  build_ios:
    name: Build iOS (Production)
    type: build
    params:
      platform: ios
      profile: production

  build_android:
    name: Build Android (Production)
    type: build
    params:
      platform: android
      profile: production

  testflight_ios:
    name: Distribute iOS to TestFlight
    type: testflight
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
      changelog: ${{ github.ref_name }}
      submit_beta_review: false
      wait_processing_timeout_seconds: 3600

  submit_android:
    name: Submit Android to Google Play
    type: submit
    needs: [build_android]
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

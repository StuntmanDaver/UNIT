# Maestro workspace for UNIT mobile app
# Bundle ID: pass with `-e MAESTRO_APP_ID=...`
#   Production: com.unitapp.mobile
#   Staging:    com.unitapp.mobile.staging
#   Dev:        com.unitapp.mobile.dev
#
# Run all flows:
#   npm run test:e2e            (from unit/)
#
# Run a single flow (from unit/):
#   JAVA_HOME=/opt/homebrew/opt/openjdk@21 \
#   MAESTRO_CLI_NO_ANALYTICS=1 \
#   ~/.maestro/bin/maestro test -e MAESTRO_APP_ID=com.unitapp.mobile maestro/flows/m2-02-directory.yaml
#
# Prerequisites:
#   - iPhone 16 Pro Max simulator booted
#   - Metro bundler running (npx expo start --ios)
#   - Dev build installed on simulator
#   - Test accounts seeded (see login screen quick-fill buttons)

appId: ${MAESTRO_APP_ID}
---
# QA-AUTH-04: Onboarding step edge cases
# Covers items 21-36 from the exhaustive inventory:
#   - Property search (debounced)
#   - "Back to properties" from profile step
#   - Sign out from any step
#
# PREREQUISITE: A fresh account with needsOnboarding=true must exist.
# Options:
#   a) Use m1-05-onboarding.yaml to create a new account, then delete the business row.
#   b) Maintain a dedicated test account: onboarding-test@mailinator.com
#
- launchApp:
    clearState: true

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 30000

# ── CASE 1: Sign out from Property step ─────────────────────────────────────
- evalScript: ${output.testEmail = 'onboard-edge-' + Date.now() + '@mailinator.com'}

- tapOn: "Sign Up"
- extendedWaitUntil:
    visible:
      text: "Create Account"
    timeout: 8000
- tapOn:
    id: "signup-email"
- inputText: ${output.testEmail}
- tapOn:
    id: "signup-password"
- inputText: "TestPass123!"
- tapOn:
    id: "signup-confirm-password"
- inputText: "TestPass123!"
- tapOn: "Create Account"
- tapOn:
    id: "btn-signup-submit"

# Should land on onboarding step 1 — Select Your Property
- extendedWaitUntil:
    visible:
      text: "Select Your Property"
    timeout: 20000

# ── CASE 2: Property search (debounced) ─────────────────────────────────────
- tapOn:
    text: "Search properties..."
- inputText: "xyz_nonexistent_property"
- waitForAnimationToEnd
- assertVisible: "No properties found"
- eraseText: 100

# Search with valid partial name
- inputText: "Test"
- waitForAnimationToEnd
- hideKeyboard

# Clear search to show full list
- tapOn:
    text: "Search properties..."
- eraseText: 100
- hideKeyboard

# ── CASE 3: Select property → profile step ───────────────────────────────────
- tapOn:
    index: 0
    childOf:
      id: "property-list-item"
- extendedWaitUntil:
    visible:
      text: "Create Your Profile"
    timeout: 8000

# ── CASE 4: "Back to properties" → property step ─────────────────────────────
- tapOn: "Back to properties"
- extendedWaitUntil:
    visible:
      text: "Select Your Property"
    timeout: 6000

# Select property again
- tapOn:
    index: 0
    childOf:
      id: "property-list-item"
- extendedWaitUntil:
    visible:
      text: "Create Your Profile"
    timeout: 8000

# ── CASE 5: Sign out from profile step ───────────────────────────────────────
# SignOutLink renders "Sign out" (lowercase 'o')
- scrollUntilVisible:
    element:
      text: "Sign out"
    direction: DOWN
- tapOn: "Sign out"
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

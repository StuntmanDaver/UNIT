appId: ${MAESTRO_APP_ID}
---
# QA-PROFILE-03: Profile edit — full field coverage
# Covers items 151-159 from the exhaustive inventory:
#   - Change business name (required)
#   - Change category chip
#   - Change description
#   - Change contact name / phone / email / website
#   - Zod validation (empty required field)
#   - Save → success toast + back
#   - Cancel → back without saving
#
# PREREQUISITE: tenant1 has an existing business profile (created during onboarding).

- launchApp:
    clearState: true

# Dev build: clearState resets launcher URL — open Metro bundle before login waits on "Log In".
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- runFlow: ../subflows/login-tenant1.yaml

- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    notVisible:
      text: "Loading profile..."
    timeout: 15000

- tapOn: "Edit Profile"
- extendedWaitUntil:
    visible:
      text: "Edit Profile"
    timeout: 8000

# ── CASE 1: Clear business name → validation error on save ────────────────────
- tapOn:
    id: "profile-business-name-input"
- eraseText: 100
- tapOn: "Edit Profile"
- scrollUntilVisible:
    element:
      id: "btn-profile-save"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "btn-profile-save"
# Zod error for required field; stays on edit screen
- assertVisible: "Edit Profile"

# Restore business name
- scrollUntilVisible:
    element:
      id: "profile-business-name-input"
    direction: UP
- tapOn:
    id: "profile-business-name-input"
- inputText: "Updated Test Business"
- pressKey: Enter

# ── CASE 2: Change category chip ─────────────────────────────────────────────
- tapOn: "Medical"
- waitForAnimationToEnd

# ── CASE 3: Change description ───────────────────────────────────────────────
- tapOn:
    id: "profile-description-input"
- eraseText: 200
- inputText: "Updated description from Maestro E2E test."
- tapOn: "Edit Profile"

# ── CASE 4: Change contact fields ─────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "profile-contact-name-input"
    direction: DOWN
- tapOn:
    id: "profile-contact-name-input"
- eraseText: 100
- inputText: "QA Contact"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "profile-phone-input"
    direction: DOWN
- tapOn:
    id: "profile-phone-input"
- eraseText: 100
- inputText: "5551234567"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "profile-email-input"
    direction: DOWN
- tapOn:
    id: "profile-email-input"
- eraseText: 100
- inputText: "qa@unit-test.com"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "profile-website-input"
    direction: DOWN
- tapOn:
    id: "profile-website-input"
- eraseText: 100
- inputText: "https://unit.app"
- pressKey: Enter

# ── CASE 5: Save → success toast → back ──────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "btn-profile-save"
    direction: DOWN
    centerElement: true
- tapOn:
    id: "btn-profile-save"
- extendedWaitUntil:
    visible:
      text: "Profile"
    timeout: 15000
- assertVisible: "Updated description from Maestro E2E test."

# ── CASE 6: Cancel path ───────────────────────────────────────────────────────
- tapOn: "Edit Profile"
- extendedWaitUntil:
    visible:
      text: "Edit Profile"
    timeout: 8000
- tapOn: "Cancel"
- extendedWaitUntil:
    notVisible:
      text: "Loading profile..."
    timeout: 8000

- runFlow: ../subflows/logout.yaml

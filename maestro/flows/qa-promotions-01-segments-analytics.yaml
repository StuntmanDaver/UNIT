appId: ${MAESTRO_APP_ID}
---
# QA-PROMOTIONS-01: Promotions list — segments, analytics scroll-view trigger, CTA tap
# Covers items 93-102 from the exhaustive inventory:
#   - Segment All / Tenant Offers / Local Deals
#   - Pull-to-refresh
#   - FAB → create screen
#   - Advertiser CTA button → Linking.openURL (asserted sheet opens)
#   - Tenant promo cards non-pressable (no navigation)
#
# PREREQUISITE:
#   - At least one approved advertiser promotion visible in tenant1's property feed
#     (to test analytics view/tap and CTA button).
#   - At least one tenant offer promotion.

- launchApp:
    clearState: true

# Dev build: clearState resets launcher URL — open Metro bundle before login waits on "Log In".
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- runFlow: ../subflows/login-tenant1.yaml

- tapOn:
    id: "tab-promotions"
- assertVisible: "Promotions"
- extendedWaitUntil:
    notVisible:
      text: "Loading promotions..."
    timeout: 10000

# ── CASE 1: Segment All ───────────────────────────────────────────────────────
- tapOn: "All"
- waitForAnimationToEnd

# ── CASE 2: Segment Tenant Offers ────────────────────────────────────────────
- tapOn: "Tenant Offers"
- waitForAnimationToEnd

# ── CASE 3: Segment Local Deals (advertisers only) ───────────────────────────
- tapOn: "Local Deals"
- waitForAnimationToEnd
- assertVisible: "Local Deals"

# ── CASE 4: Back to All ───────────────────────────────────────────────────────
- tapOn: "All"
- waitForAnimationToEnd

# ── CASE 5: Pull-to-refresh ───────────────────────────────────────────────────
- swipe:
    direction: DOWN
    duration: 500
- waitForAnimationToEnd
- assertVisible: "Promotions"

# ── CASE 6: Scroll list — triggers viewability analytics for advertiser items ──
- swipe:
    from:
      id: "promotions-list"
    direction: DOWN
    duration: 800
- waitForAnimationToEnd
- swipe:
    from:
      id: "promotions-list"
    direction: UP
    duration: 800
- waitForAnimationToEnd

# ── CASE 7: Tap advertiser CTA button → opens external URL ────────────────────
# (System browser opens; we back out immediately)
- runFlow:
    when:
      visible: "Learn More"
    commands:
      - tapOn: "Learn More"
      - waitForAnimationToEnd
      - back
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Shop Now"
    commands:
      - tapOn: "Shop Now"
      - waitForAnimationToEnd
      - back
      - waitForAnimationToEnd

# ── CASE 8: FAB → create screen ──────────────────────────────────────────────
- tapOn:
    id: "fab-create-promotion"
- extendedWaitUntil:
    visible:
      text: "Promote My Business"
    timeout: 8000

# Cancel
- tapOn: "Cancel"
- assertVisible: "Promotions"

- runFlow: ../subflows/logout.yaml

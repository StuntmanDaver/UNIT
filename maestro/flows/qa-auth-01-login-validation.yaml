appId: com.unitapp.mobile
---
# QA-AUTH-01: Login screen validation paths
# Covers items 1-11 from the exhaustive inventory:
#   - Valid tenant login → Home
#   - Valid admin login → Dashboard
#   - Wrong password → error toast
#   - Empty email → field error
#   - "Forgot password?" flows
#   - Sign Up link navigation
#
# Prerequisites: tenant1@unit-test.com and david@cultrhealth.com exist in Supabase auth

- launchApp:
    clearState: true

# Handle dev-build prompts
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: "http://localhost:8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 30000

# ── CASE 1: Wrong password ───────────────────────────────────────────────────
- tapOn:
    id: "login-email"
- inputText: "tenant1@unit-test.com"
- tapOn:
    id: "login-password"
- inputText: "wrongpassword"
- tapOn:
    id: "btn-login-submit"
- extendedWaitUntil:
    visible:
      text: "Login failed"
    timeout: 10000
# Must still be on login screen
- assertVisible: "Log In"

# Clear fields
- tapOn:
    id: "login-email"
- eraseText: 100
- tapOn:
    id: "login-password"
- eraseText: 100
- hideKeyboard

# ── CASE 2: Empty email, attempt submit → Zod field error ────────────────────
- tapOn:
    id: "login-password"
- inputText: "admin123"
- tapOn:
    id: "btn-login-submit"
# Zod error appears inline near the email field
- assertVisible: "Log In"
- tapOn:
    id: "login-password"
- eraseText: 100
- hideKeyboard

# ── CASE 3: Forgot password with empty email — guard prevents reset, stay on login.
# Toast (`Enter your email above, then tap here again`) auto-dismisses in ~4s; rely on
# the absence of the "Check your email" success toast and on the login screen still
# being rendered, both of which are stable post-tap.
- tapOn: "Forgot password?"
- waitForAnimationToEnd
- assertNotVisible: "Check your email"
- assertVisible: "Forgot password?"

# ── CASE 4: Forgot password with valid email — request fires, stay on login.
# Toast ("Check your email") auto-dismisses; assert we remain on login instead.
- tapOn:
    id: "login-email"
- inputText: "tenant1@unit-test.com"
- tapOn: "Forgot password?"
- waitForAnimationToEnd
- assertVisible: "Forgot password?"
- assertVisible:
    id: "login-email"
- tapOn:
    id: "login-email"
- eraseText: 100
- hideKeyboard

# ── CASE 5: Sign Up link navigates to signup screen ─────────────────────────
- tapOn: "Sign Up"
- extendedWaitUntil:
    visible:
      text: "Create Account"
    timeout: 8000
# Go back to login
- tapOn: "Log In"
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

# ── CASE 6: Dev quick-fill chip → Admin (only verify chip prefills email) ────
- runFlow:
    when:
      visible: "Admin"
    commands:
      - tapOn: "Admin"
      - waitForAnimationToEnd
      - assertVisible: "david@cultrhealth.com"
      # Clear the prefilled credentials so CASE 7 can log in as tenant1.
      - tapOn:
          id: "login-email"
      - eraseText: 100
      - tapOn:
          id: "login-password"
      - eraseText: 100

# ── CASE 7: Valid tenant login lands on Home ─────────────────────────────────
- runFlow: ../subflows/login-tenant1.yaml
- assertVisible: "My Property"
- runFlow: ../subflows/logout.yaml

# ── CASE 8: Valid admin login lands on Admin Dashboard ───────────────────────
- runFlow: ../subflows/login-admin.yaml
- assertVisible: "Admin Dashboard"
- tapOn:
    id: "admin-logout-btn"
- extendedWaitUntil:
    visible:
      text: "Are you sure you want to log out?"
    timeout: 8000
- tapOn:
    text: "Log Out"
    index: 1
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

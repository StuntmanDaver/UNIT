appId: com.unitapp.mobile
---
# M2-04: Tenant creates a promotion offer

- launchApp:
    clearState: true
- runFlow: ../subflows/login-tenant1.yaml

# Navigate to Promotions tab
- tapOn:
    id: "tab-promotions"
- assertVisible: "Promotions"

# Tap FAB (+) to create
- tapOn:
    text: "+"
- extendedWaitUntil:
    visible:
      text: "Create"
    timeout: 8000

# Fill promotion form
- tapOn:
    label: "Title"
- inputText: "E2E Test Offer"
- tapOn:
    label: "Description"
- inputText: "This is an automated test promotion"
- hideKeyboard

# Submit
- tapOn: "Post"
- extendedWaitUntil:
    visible:
      text: "E2E Test Offer"
    timeout: 10000

- runFlow: ../subflows/logout.yaml

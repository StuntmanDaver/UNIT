appId: ${MAESTRO_APP_ID}
---
# QA-PROMOTIONS-02: Promotion create — full submit path with date picker
#
# Tests the date picker fix: on iOS, the spinner used to auto-advance to
# 'End Date' on every scroll tick (because onChange fires continuously).
# Fixed: draftDate now tracks spinner state, commit + advance only on Done tap.
#
# This test creates a real promotion in production Supabase. Test promotions
# can be identified by headline "QA Test Promotion" and cleaned up via the
# admin promotions screen (Draft segment).

- launchApp:
    clearState: true

# Dev client overlay
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- runFlow: ../subflows/login-tenant1.yaml

- tapOn:
    id: "tab-promotions"
- assertVisible: "Promotions"

# ── Open create form ────────────────────────────────────────────────────────
- tapOn:
    id: "fab-create-promotion"
- extendedWaitUntil:
    visible:
      text: "Promote My Business"
    timeout: 8000

# ── Required fields ─────────────────────────────────────────────────────────
- tapOn:
    id: "promotion-headline"
- inputText: "QA Test Promotion"

- tapOn:
    id: "promotion-description"
- inputText: "Automated Maestro promotion for end-to-end testing."

# ── Start date — opens iOS spinner overlay (keyboard auto-dismissed) ────────
# With the fix: the spinner stays in "Start Date" mode while scrolling.
# Tapping Done commits the start date AND auto-advances to "End Date" overlay.
- tapOn:
    id: "promotion-start-date"
- extendedWaitUntil:
    visible:
      id: "date-picker-done"
    timeout: 5000
- swipe:
    start: "50%, 80%"
    end: "50%, 65%"
- waitForAnimationToEnd
- tapOn:
    id: "date-picker-done"
- waitForAnimationToEnd

# ── End date — iOS auto-advanced here. Tap Done to commit.
- extendedWaitUntil:
    visible:
      id: "date-picker-done"
    timeout: 5000
- swipe:
    start: "50%, 80%"
    end: "50%, 65%"
- waitForAnimationToEnd
- tapOn:
    id: "date-picker-done"
- waitForAnimationToEnd

# ── Submit ──────────────────────────────────────────────────────────────────
- scrollUntilVisible:
    element:
      id: "promotion-submit"
    direction: DOWN
    centerElement: true
- waitForAnimationToEnd
- tapOn:
    id: "promotion-submit"

# ── Verify landed on pending-payment screen ────────────────────────────────
- extendedWaitUntil:
    visible:
      text: "Pending Payment"
    timeout: 15000

- runFlow: ../subflows/logout.yaml

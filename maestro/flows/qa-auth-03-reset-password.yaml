appId: ${MAESTRO_APP_ID}
---
# QA-AUTH-03: Reset password screen — validation + happy path
# Covers items 17-20 from the exhaustive inventory:
#   - Mismatched confirm → Zod error
#   - Weak password → Zod error
#   - Valid new password → success, session refreshed
#
# PREREQUISITE (manual, run once before this flow):
#   In Supabase: set profile.needs_password_change = true for tenant-reset@unit-test.com
#   Or: invite a fresh tenant and log in as that account (invited tenants have needs_password_change=true)
#
# This flow logs in as an invited tenant account that has needs_password_change = true.
# AuthGuard will automatically redirect to /(auth)/reset-password on login.
#
# Test account: tenant-reset@unit-test.com / TempPass123!
# (Create via admin invite flow in qa-admin-02-tenants-add-invite.yaml)

- launchApp:
    clearState: true

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 30000

# Login as the reset-required account
- tapOn:
    id: "login-email"
- inputText: "tenant-reset@unit-test.com"
- tapOn:
    id: "login-password"
- inputText: "TempPass123!"
- tapOn:
    id: "btn-login-submit"

# AuthGuard should redirect to reset-password
- extendedWaitUntil:
    visible:
      text: "Update Password"
    timeout: 15000

# ── CASE 1: Mismatched confirm → Zod error ────────────────────────────────────
- tapOn:
    id: "reset-password-new"
- inputText: "NewSecurePass123!"
- tapOn:
    id: "reset-password-confirm"
- inputText: "DifferentPass456!"
- hideKeyboard
- tapOn:
    id: "btn-update-password"
# Stays on reset-password with field error
- assertVisible: "Update Password"

# Clear both fields and fix them. The failed submit can leave focus/error state on
# either secure input, so refill both exact accessibility labels.
- tapOn:
    id: "reset-password-new"
- eraseText: 100
- inputText: "NewSecurePass123!"
- tapOn:
    id: "reset-password-confirm"
- eraseText: 100
- inputText: "NewSecurePass123!"
- hideKeyboard

# ── CASE 2: Happy path — valid password → redirected away from reset-password ─
- tapOn:
    id: "btn-update-password"
- extendedWaitUntil:
    visible:
      text: "Password updated"
    timeout: 20000
# After success AuthGuard should route to onboarding or home (not reset-password)
- assertNotVisible: "Update Password"

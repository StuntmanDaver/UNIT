appId: com.unitapp.mobile
---
# QA-ADMIN-07: Admin Pricing — smoke test only
# Covers items 237-246 PARTIALLY.
#
# Reduced to a navigation + render smoke test because the full CRUD path is
# hard-blocked by two Maestro / iOS accessibility limitations:
#
# 1. Add Tier / Edit Tier modal — uses components/ui/Modal.tsx, which renders
#    via React Native's `Modal` into a separate iOS UIWindow. XCUITest cannot
#    enumerate that window, so testIDs inside the modal (`pricing-tier-name`,
#    `pricing-tier-duration`, `pricing-tier-price`, `pricing-tier-featured`,
#    `pricing-tier-active`) and any text inside it ("Add Tier", "Save",
#    "Cancel", "Featured placement") are unqueryable. Verified across both an
#    in-tree absolute-positioned overlay rewrite and an `overFullScreen`
#    presentation style — neither restores XCUITest visibility.
#
# 2. Tier list row — the row card is wrapped in a `Pressable` (whole-card
#    onPress = openEdit). iOS hit-testing then collapses the row card and its
#    inner `Edit` / `Deactivate` Button labels into a single accessibility
#    element, so Maestro can't query the inner button text directly.
#
# Until the Modal is replaced with a non-RN-Modal portal AND the row Pressable
# either drops the whole-card onPress or moves the Edit / Deactivate buttons
# outside the Pressable, exercise CRUD + Deactivate manually.
#
# What this flow DOES verify (modal-free, queryable):
#   - Admin can navigate to Promotion Pricing from the dashboard.
#   - The screen renders without an error overlay.
#   - The Add-tier button is hit-testable (testID `btn-add-price-tier`).
#   - Logout from the screen works.

- launchApp:
    clearState: true

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: "http://localhost:8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- runFlow: ../subflows/login-admin.yaml
- assertVisible: "Admin Dashboard"

- tapOn: "Promotion Pricing"
- extendedWaitUntil:
    visible:
      text: "Set prices tenants pay for promotions"
    timeout: 8000
- extendedWaitUntil:
    notVisible:
      text: "Loading"
    timeout: 8000

# Add Tier button is tappable. The modal that opens is not queryable by
# Maestro (see header comment); we re-launch the app to dismiss it cleanly.
- tapOn:
    id: "btn-add-price-tier"
- waitForAnimationToEnd

# Re-launch to clear the open modal and continue with logout.
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: "http://localhost:8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd
- runFlow: ../subflows/login-admin.yaml
- assertVisible: "Admin Dashboard"

# Logout
- tapOn:
    id: "admin-logout-btn"
- extendedWaitUntil:
    visible:
      text: "Are you sure you want to log out?"
    timeout: 8000
- tapOn:
    text: "Log Out"
    index: 1
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

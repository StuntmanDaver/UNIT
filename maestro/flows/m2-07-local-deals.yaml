appId: com.unitapp.mobile
---
# M2-07: Local Deals segment shows only approved advertiser promotions

- launchApp:
    clearState: false
- runFlow: ../subflows/login-tenant1.yaml

- tapOn: "Promotions"
- assertVisible: "Promotions"

# Tap "Local Deals" segment
- tapOn: "Local Deals"
- waitForAnimationToEnd

# Should not show pending items — just assert the segment is active
- assertVisible: "Local Deals"

# Tap "All" to reset
- tapOn: "All"

- runFlow: ../subflows/logout.yaml

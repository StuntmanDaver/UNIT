appId: com.unitapp.mobile
---
# M2-01: Tenant profile edit — verifies spinner fix and profile edit flow

- launchApp:
    clearState: false
- runFlow: ../subflows/login-tenant1.yaml

# Navigate to Profile tab
- tapOn: "Profile"

# Spinner fix check: profile should load (not spin indefinitely)
# The useCurrentUser hook now has a 10s timeout — if it hits, "No business profile yet" appears
# Either way, the spinner must resolve within 15s
- assertNotVisible:
    text: "Loading profile..."
    timeout: 15000

# If business exists, tap Edit Profile
- tapOn: "Edit Profile"
- assertVisible:
    text: "Edit Profile"
    timeout: 8000

# Change business name
- tapOn:
    accessibilityLabel: "Business Name"
- clearText
- inputText: "Updated Business Name"
- hideKeyboard

# Save
- tapOn: "Save"

# Success toast should appear
- assertVisible:
    text: "Profile updated"
    timeout: 8000

# Values persist on re-open
- tapOn: "Profile"
- assertVisible: "Updated Business Name"

# Cleanup: log out
- runFlow: ../subflows/logout.yaml

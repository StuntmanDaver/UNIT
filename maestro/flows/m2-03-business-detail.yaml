appId: ${MAESTRO_APP_ID}
---
# M2-03: Business card tap → detail view → contact actions

- launchApp:
    clearState: true
- runFlow: ../subflows/login-tenant1.yaml

- assertVisible: "Directory"
- waitForAnimationToEnd

# Tap first business card. Use the BusinessCard testID — `text: "Directory"`
# was the screen heading, not the parent of the card list, so childOf would
# silently match the wrong element.
- tapOn:
    id: "business-card"
    index: 0

# Detail page should open (has business name + contact icons + back button)
# back-btn testID confirms we're on a stack screen, not the directory list.
# (`assertNotVisible: "Directory"` is unreliable — the bottom tab bar still
# renders the "Directory" tab label even when the detail page is showing.)
- assertVisible:
    id: "back-btn"
- waitForAnimationToEnd

# Back to directory — tap the in-page Back button. Maestro's `back` action
# uses iOS edge-swipe which is unreliable in the simulator.
- tapOn:
    id: "back-btn"
- extendedWaitUntil:
    visible:
      text: "Directory"
    timeout: 8000

- runFlow: ../subflows/logout.yaml

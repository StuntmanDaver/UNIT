appId: ${MAESTRO_APP_ID}
---
# QA-ADMIN-09: Admin sync — tenants + promotions visibility
#
# Verifies the admin can see:
#   1. Tenant list (self-signup + invited tenants) under Manage Tenants
#   2. Promotions list with the new "Draft" segment (for tenant promos
#      that haven't completed payment yet)
#
# NOTE: Runs against production Supabase using the seeded admin@unit-test.com
# account. The dashboard auto-selects the admin's first managed property.

- launchApp:
    clearState: true

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- runFlow: ../subflows/login-admin.yaml

# ── VERIFY: Admin dashboard loaded (login-admin subflow already verified
#    Admin Dashboard + Manage Promotions visible — stats cards aggregate text
#    into single accessibility elements so we use the menu items as anchors).
- assertVisible: "Manage Tenants"
- assertVisible: "Manage Properties"

# ── VERIFY: Manage Tenants screen loads with tenant rows ─────────────────────
- tapOn: "Manage Tenants"
- extendedWaitUntil:
    visible:
      text: "Tenants"
    timeout: 8000
- assertNotVisible: "Loading tenants..."

# Tenants should be visible (either pre-seeded or self-signup)
- assertVisible: "All"
- assertVisible: "Invited"
- assertVisible: "Active"

# ── VERIFY: Promotions screen has new "Draft" segment ───────────────────────
- tapOn:
    id: "back-btn"
- extendedWaitUntil:
    visible:
      text: "Admin Dashboard"
    timeout: 8000

- tapOn: "Manage Promotions"
- extendedWaitUntil:
    visible:
      text: "Promotions"
    timeout: 8000

# All 5 segments must be visible (Draft was added in this session)
- assertVisible: "All"
- assertVisible: "Draft"
- assertVisible: "Pending"
- assertVisible: "Approved"
- assertVisible: "External"

# Verify Draft segment is tappable and filters correctly
- tapOn: "Draft"
- waitForAnimationToEnd

# Either shows draft promotions OR shows "No promotions" empty state
# Both are valid — the assertion is that the segment selection works.
- assertVisible: "Draft"

# Admin logout: nav back to dashboard, tap admin-specific logout button
- tapOn:
    id: "back-btn"
- extendedWaitUntil:
    visible:
      text: "Admin Dashboard"
    timeout: 8000
- tapOn:
    id: "admin-logout-btn"
- extendedWaitUntil:
    visible:
      text: "Are you sure you want to log out?"
    timeout: 5000
- runFlow:
    when:
      visible: "LOG OUT"
    commands:
      - tapOn: "LOG OUT"
- runFlow:
    when:
      visible: "Log Out"
    commands:
      - tapOn:
          text: "Log Out"
          index: 1
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

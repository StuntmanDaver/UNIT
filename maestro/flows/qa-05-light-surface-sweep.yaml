appId: ${MAESTRO_APP_ID}
---
# QA-05: Light-surface visual regression sweep
# Opens the Home Feed, scrolls through cards, and captures screenshots for
# visual regression comparison against the Delta-inspired design reference.

- launchApp:
    clearState: true

# Dev build: clearState resets launcher URL — open Metro bundle before login waits on "Log In".
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- runFlow: ../subflows/login-tenant1.yaml

# Home tab should be the default landing for tenants
- assertVisible: "Home"
- waitForAnimationToEnd
- takeScreenshot: home-feed-initial

# Scroll down to reveal additional cards
- swipe:
    from:
      id: "home-feed-list"
    direction: DOWN
    duration: 800
- waitForAnimationToEnd
- takeScreenshot: home-feed-scroll-1

- swipe:
    from:
      id: "home-feed-list"
    direction: DOWN
    duration: 800
- waitForAnimationToEnd
- takeScreenshot: home-feed-scroll-2

# Tap the Nearby segment (label is "Nearby (≤ 20 mi)"; use regex to avoid Unicode issues)
- tapOn:
    text: "Nearby.*"
- waitForAnimationToEnd
- takeScreenshot: home-feed-nearby-segment

# Tap back to My Property
- tapOn: "My Property"
- waitForAnimationToEnd

# Verify existing tabs still navigate correctly
- tapOn:
    id: "tab-directory"
- assertVisible: "Directory"
- waitForAnimationToEnd

- tapOn:
    id: "tab-promotions"
- assertVisible: "Promotions"
- waitForAnimationToEnd

- tapOn:
    id: "tab-community"
- assertVisible: "Community"
- waitForAnimationToEnd

- tapOn:
    id: "tab-alerts"
- waitForAnimationToEnd

- tapOn:
    id: "tab-home"
- assertVisible: "Home"
- waitForAnimationToEnd
- takeScreenshot: home-feed-return

- runFlow: ../subflows/logout.yaml

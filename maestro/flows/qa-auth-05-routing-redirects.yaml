appId: com.unitapp.mobile
---
# QA-AUTH-05: AuthGuard routing — cold start session restore and role redirects
# Covers items 37-43 from the exhaustive inventory:
#   - Cold start with valid tenant session → Home
#   - Cold start with valid admin session → Admin Dashboard
#   - Cold start with no session → login
#   - Splash screen resolves (no infinite spinner)
#
# NOTE: "clearState: false" (no state wipe) is used for session-restore cases.
#       These must be run after a successful login in the same simulator to have a session.

- launchApp:
    clearState: true

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: "http://localhost:8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

# ── CASE 1: No session → login screen ────────────────────────────────────────
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 30000
- assertNotVisible: "My Property"
- assertNotVisible: "Admin Dashboard"

# ── CASE 2: Log in as tenant → Home ──────────────────────────────────────────
- runFlow: ../subflows/login-tenant1.yaml
- assertVisible: "My Property"

# ── CASE 3: Kill & restart app (no clearState) → session restored → Home ─────
- stopApp
- launchApp:
    clearState: false
# Splash resolves without infinite spinner
- extendedWaitUntil:
    visible:
      text: "My Property"
    timeout: 20000
- assertNotVisible: "Log In"

# ── CASE 4: Log out → then restart cold → shows login ────────────────────────
- runFlow: ../subflows/logout.yaml
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 20000

# ── CASE 5: Log in as admin → Admin Dashboard ────────────────────────────────
- runFlow: ../subflows/login-admin.yaml
- assertVisible: "Admin Dashboard"

# ── CASE 6: Kill & restart as admin → session restored → Admin Dashboard ──────
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Admin Dashboard"
    timeout: 20000

# Cleanup
- tapOn:
    id: "admin-logout-btn"
- tapOn: "Log Out"
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

appId: com.unitapp.mobile
---
# M5-01: Home Feed (LinkedIn-style activity stream)
# Verifies tenant lands on Home, sees activity, can switch to Nearby segment,
# tap a card, and return without crashing.

- launchApp:
    clearState: true
- runFlow: ../subflows/login-tenant1.yaml

# After login, tenants now land on Home (US-002 made it the default tab)
- tapOn: "Home"
- extendedWaitUntil:
    visible:
      text: "My Property"
    timeout: 8000

# At least one activity card should be visible. The seed data guarantees
# either a recent post or promotion in the property feed.
- assertVisible: "My Property"

# Switch to Nearby segment. The toggle is visible regardless of neighbour
# count; tapping it is allowed even if disabled (no-op should not crash).
- tapOn:
    text: "Nearby \\(≤ 2 mi\\)"
- waitForAnimationToEnd

# Tap the first activity card and verify navigation. This proves the
# row press handler routes into the correct detail screen without
# silently swallowing the tap.
- tapOn:
    index: 0
    point: "50%,55%"
- waitForAnimationToEnd

- back

# Returning to Home should not blank-screen the feed.
- assertVisible: "My Property"

- runFlow: ../subflows/logout.yaml

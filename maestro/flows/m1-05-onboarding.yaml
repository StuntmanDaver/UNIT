appId: com.unitapp.mobile
---
# M1-05: Fresh signup → onboarding → directory
# BUG-03 regression: after signup AuthGuard must redirect to onboarding, NOT tabs
#
# MANUAL STEP REQUIRED before running:
#   Create a fresh Mailinator account in Supabase auth (or use the app signup)
#   and ensure no business profile exists for the test email.
#
# This flow uses the Sign Up path with a timestamp-based email.

- launchApp:
    clearState: true
- assertVisible:
    text: "Log In"
    timeout: 10000

# Navigate to sign up
- tapOn: "Sign Up"
- assertVisible: "Create Account"

# Generate a unique email for this run
- evalScript: |
    var ts = Date.now();
    output.testEmail = 'e2e-' + ts + '@mailinator.com';
    output.testPassword = 'TestPass123!';

# Fill signup form
- tapOn:
    accessibilityLabel: "Email"
- inputText: ${output.testEmail}
- tapOn:
    accessibilityLabel: "Password"
- inputText: ${output.testPassword}
- tapOn:
    accessibilityLabel: "Confirm Password"
- inputText: ${output.testPassword}
- hideKeyboard
- tapOn: "Sign Up"

# NOTE: Supabase email confirmation may be required.
# If email confirmation is disabled in Supabase auth settings,
# the flow continues automatically to onboarding.
# If confirmation is required, this flow will stop here and need manual email click.

# BUG-03 check: must land on onboarding, not directory
- assertVisible:
    text: "Select Your Property"
    timeout: 15000

# Step 1: Select property (tap first available property)
- scrollUntilVisible:
    element:
      index: 0
    direction: DOWN
- tapOn:
    index: 0
    childOf:
      id: "property-list-item"

# If the above doesn't work, try tapping first text in the list after the header
# Property items show name text — try tapping by position if needed

# Step 2: Select unit
- assertVisible: "Select Your Unit"
- scrollUntilVisible:
    element:
      index: 0
    direction: DOWN
- tapOn:
    index: 0
    childOf:
      id: "unit-list-item"

# Step 3: Fill profile
- assertVisible: "Create Your Profile"
- tapOn:
    accessibilityLabel: "Business Name"
- inputText: "E2E Test Business"
- hideKeyboard
# Select first category chip
- scrollUntilVisible:
    element:
      text: "Services"
    direction: RIGHT
- tapOn: "Services"
- tapOn: "Create Profile"

# Success: redirected to directory
- assertVisible:
    text: "Directory"
    timeout: 20000

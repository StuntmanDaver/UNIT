appId: ${MAESTRO_APP_ID}
---
# M1-05: Fresh signup → onboarding → pending-approval
# Tests the complete new-user flow end-to-end:
#   1. Signup with a fresh mailinator email
#   2. Land on onboarding (BUG-03 regression check)
#   3. Select property
#   4. Fill profile form (business name + category required)
#   5. Submit → land on pending-approval screen
#
# Note: New self-signup users remain status='invited' after onboarding,
# so they land on pending-approval (not Directory). An admin must approve
# before they can access the main tabs.

- launchApp:
    clearState: true

# Handle dev client overlay (shown when app is a development build)
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: ".*8081"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 60000

# Navigate to sign up
- tapOn: "Sign Up"
- extendedWaitUntil:
    visible:
      text: "Create Account"
    timeout: 8000

# Generate a unique email for this run (single-line evalScript required)
- evalScript: ${output.testEmail = 'e2e-' + Date.now() + '@mailinator.com'}

# Fill signup form using testIDs
- tapOn:
    id: "signup-email"
- inputText: ${output.testEmail}
- tapOn:
    id: "signup-password"
- inputText: "TestPass123!"
- tapOn:
    id: "signup-confirm-password"
- inputText: "TestPass123!"
- tapOn: "Create Account"
- scrollUntilVisible:
    element:
      id: "btn-signup-submit"
    direction: DOWN
- tapOn:
    id: "btn-signup-submit"

# BUG-03 check: must land on onboarding (Select Your Property), NOT tabs
- extendedWaitUntil:
    visible:
      text: "Select Your Property"
    timeout: 20000

# Step 1: Select the first available property (tap the row directly by testID)
- waitForAnimationToEnd
- tapOn:
    id: "property-list-item"
    index: 0

# Step 2: Fill business profile form (no unit selection step in current flow)
- extendedWaitUntil:
    visible:
      text: "Create Your Profile"
    timeout: 8000

- tapOn:
    id: "onboarding-business-name"
- inputText: "E2E Test Business"
- tapOn: "Create Your Profile"

# Select a category chip — tap "Restaurant" (first chip, always visible)
- tapOn: "Restaurant"

# Submit the form
- tapOn:
    id: "btn-create-profile"

# After successful submission the user lands on either:
#   - the Home feed (if the Supabase project auto-activates new tenants), or
#   - the Approval pending screen (if admin approval is required)
# Both are valid success states — profile was created and onboarding is done.
- runFlow:
    when:
      visible: "Approval pending"
    commands:
      - assertVisible: "Approval pending"
- runFlow:
    when:
      notVisible: "Approval pending"
    commands:
      - extendedWaitUntil:
          visible:
            text: "Home"
          timeout: 30000
      - assertVisible: "Home"

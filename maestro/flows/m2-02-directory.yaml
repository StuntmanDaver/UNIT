appId: ${MAESTRO_APP_ID}
---
# M2-02: Directory browse, search, and category filter

- launchApp:
    clearState: true
- runFlow: ../subflows/login-tenant1.yaml

# Directory should be visible already (default tab)
- assertVisible: "Directory"

# Businesses should render (wait for query)
- waitForAnimationToEnd

# Search: type partial name
- tapOn:
    id: "search-input"
- inputText: "Test"
- waitForAnimationToEnd
# Note: TextInput value is not in the iOS accessibility tree as a Text node,
# so we can't directly assert the typed text. The clear-search step below
# verifies the input still works end-to-end.
- hideKeyboard

# Clear search
- tapOn:
    id: "search-input"
- eraseText: 100
- hideKeyboard

# Category filter: bounded repeat swipes the horizontal FlatList LEFT
# (anchored to testID) until "Healthcare" is visible, then taps. Each
# swipe advances ~2-3 chips; Healthcare is at position 13.
- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            notVisible: "Healthcare"
          commands:
            - swipe:
                from:
                  id: "category-chips-list"
                direction: LEFT
                duration: 600
- tapOn: "Healthcare"
- waitForAnimationToEnd

# Tap "All" to clear filter — CategoryChips shows "All" chip
- tapOn: "All"
- waitForAnimationToEnd

# Log out
- runFlow: ../subflows/logout.yaml

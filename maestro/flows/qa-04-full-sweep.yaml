appId: com.unitapp.mobile
---
# QA-04: Drive through every tab + admin screen
# Metro console should show only the known benign push-token warning

- launchApp:
    clearState: true
# clearState wipes EXDevLauncher's saved Metro URL on dev builds, so the app
# lands on the launcher landing page. Tap into the bundle if it's showing.
- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: "http://localhost:8081"
      - extendedWaitUntil:
          visible:
            text: "Log In"
          timeout: 30000
# iOS push-notification permission prompt may pop on first JS run after
# clearState. Allow it if it appears.
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
# Expo dev menu first-launch hint may appear after clearState. When it
# does, Continue advances it to the full menu and Close dismisses. When
# it doesn't (state persisted from a prior fresh install), skip both.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd
# Notification prompt sometimes fires AFTER bundle load too.
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow: ../subflows/login-tenant1.yaml

# Home Feed sweep (US-021 / m5-01)
- tapOn:
    id: "tab-home"
- extendedWaitUntil:
    visible:
      text: "My Property"
    timeout: 8000
- tapOn:
    text: "Nearby \\(≤ 2 mi\\)"
- waitForAnimationToEnd

# Tab sweep
- tapOn:
    id: "tab-directory"
- assertVisible: "Directory"
- waitForAnimationToEnd

- tapOn:
    id: "tab-promotions"
- assertVisible: "Promotions"
- waitForAnimationToEnd

- tapOn:
    id: "tab-community"
- assertVisible: "Community"
- waitForAnimationToEnd

- tapOn:
    id: "tab-alerts"
- waitForAnimationToEnd

- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    notVisible:
      text: "Loading profile..."
    timeout: 15000

- runFlow: ../subflows/logout.yaml

# Admin sweep
- runFlow: ../subflows/login-admin.yaml

# Admin screen sweep
- assertVisible: "Admin Dashboard"
- tapOn: "Manage Tenants"
- assertVisible: "Tenants"
- tapOn:
    point: "6%,9%"
- waitForAnimationToEnd

- tapOn: "Manage Properties"
- assertVisible: "Properties"
- tapOn:
    point: "6%,9%"
- waitForAnimationToEnd

- tapOn: "View Pending Approvals"
- assertVisible: "Pending"
- tapOn:
    point: "6%,9%"
- waitForAnimationToEnd

- tapOn: "Account & Settings"
- assertVisible: "Account"
- tapOn:
    point: "6%,9%"
- waitForAnimationToEnd

# Log out
- tapOn:
    id: "admin-logout-btn"
- tapOn: "Log Out"
- assertVisible: "Are you sure you want to log out?"
- tapOn:
    text: "Log Out"
    index: 1
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

# Tenant-paid promotion happy path (US-021 / m5-02). Requires Stripe
# test-mode credentials on the dev Edge Function. Skip with
# `maestro test --exclude-tags=stripe` if Stripe is not configured.
- runFlow: ./m5-02-tenant-paid-promotion.yaml

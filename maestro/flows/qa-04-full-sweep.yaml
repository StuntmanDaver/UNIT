appId: com.unitapp.mobile
---
# QA-04: Drive through every tab + admin screen
# Metro console should show only the known benign push-token warning

- launchApp:
    clearState: true
- runFlow: ../subflows/login-tenant1.yaml

# Home Feed sweep (US-021 / m5-01)
- tapOn: "Home"
- extendedWaitUntil:
    visible:
      text: "My Property"
    timeout: 8000
- tapOn:
    text: "Nearby"
- waitForAnimationToEnd

# Tab sweep
- tapOn: "Directory"
- assertVisible: "Directory"
- waitForAnimationToEnd

- tapOn: "Promotions"
- assertVisible: "Promotions"
- waitForAnimationToEnd

- tapOn: "Community"
- assertVisible: "Community"
- waitForAnimationToEnd

- tapOn: "Alerts"
- waitForAnimationToEnd

- tapOn: "Profile"
- extendedWaitUntil:
    notVisible:
      text: "Loading profile..."
    timeout: 15000

- runFlow: ../subflows/logout.yaml

# Admin sweep
- runFlow: ../subflows/login-admin.yaml

# Select property
- tapOn: "Select a property"
- waitForAnimationToEnd
- tapOn:
    index: 0
- waitForAnimationToEnd

# Admin screen sweep
- assertVisible: "Admin Dashboard"
- tapOn: "Manage Tenants"
- assertVisible: "Tenants"
- back

- tapOn: "Manage Properties"
- assertVisible: "Properties"
- back

- tapOn: "View Pending Approvals"
- assertVisible: "Pending"
- back

- tapOn: "Account & Settings"
- assertVisible: "Account"
- back

# Log out
- tapOn:
    id: "admin-logout-btn"
- tapOn: "Log Out"
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 8000

# Tenant-paid promotion happy path (US-021 / m5-02). Requires Stripe
# test-mode credentials on the dev Edge Function. Skip with
# `maestro test --exclude-tags=stripe` if Stripe is not configured.
- runFlow: ./m5-02-tenant-paid-promotion.yaml

appId: com.unitapp.mobile
---
# QA-DEEPLINK-01: Stripe checkout return URL handling
# Covers items 272-274 from the exhaustive inventory:
#   - Return URL unit://promotions?status=success → "Awaiting Review" + "Payment received" toast
#   - Return URL unit://promotions?status=cancel → no status change, stays on pending
#   - User dismisses Safari View Controller (back gesture) → graceful
#
# This flow tests the HAPPY PATH (status=success). The full Stripe iframe entry
# is covered by m5-02-tenant-paid-promotion.yaml.
#
# The cancel path and SVC dismissal are not fully automatable in Maestro because
# they require interacting with the system in-app browser. They are marked as
# MANUAL steps below with assertions for what to verify.
#
# PREREQUISITE: Stripe test mode keys configured on the dev Edge Function.
#               At least one active pricing tier exists.

- launchApp:
    clearState: true

- runFlow:
    when:
      visible: "Development Build"
    commands:
      - tapOn: "http://localhost:8081"
      - extendedWaitUntil:
          visible:
            text: "Log In"
          timeout: 30000
- runFlow:
    when:
      visible: "Would Like to Send You Notifications"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd

- runFlow: ../subflows/login-tenant1.yaml

# Create a promotion and get to pending-payment
- tapOn:
    id: "tab-promotions"
- tapOn:
    id: "fab-create-promotion"
- extendedWaitUntil:
    visible:
      text: "Promote My Business"
    timeout: 8000

- tapOn:
    id: "promotion-headline"
- inputText: "QA Deeplink Test Promo"
- tapOn:
    id: "promotion-description"
- inputText: "Testing Stripe return URL deep link handling."
- tapOn: "Promote My Business"

- tapOn:
    id: "promotion-start-date"
- waitForAnimationToEnd
- swipe:
    start: "50%, 85%"
    end: "50%, 80%"
- waitForAnimationToEnd
- swipe:
    start: "50%, 85%"
    end: "50%, 65%"
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "Cancel, Start Date, Done"
    commands:
      - tapOn:
          point: "92%, 71%"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Cancel, End Date, Done"
    commands:
      - tapOn:
          point: "92%, 71%"
      - waitForAnimationToEnd

- swipe:
    start: "50%, 60%"
    end: "50%, 15%"
- waitForAnimationToEnd

- tapOn:
    id: "promotion-submit"
- extendedWaitUntil:
    visible:
      text: "Pending Payment"
    timeout: 12000

# Select first tier and initiate Pay Now
- tapOn:
    index: 0
    point: "50%,50%"
- waitForAnimationToEnd
- tapOn: "Pay Now"

# ── Stripe in-app browser opens ───────────────────────────────────────────────
# AUTOMATED: Stripe Checkout opens in Safari View Controller.
# Full card entry is covered by m5-02. Here we test the dismiss/cancel path
# by pressing Back immediately (SVC dismissal = graceful cancel).
- extendedWaitUntil:
    visible:
      text: "Card information"
    timeout: 20000

# ── CASE: Dismiss SVC without paying → app stays on pending-payment ───────────
- back
- waitForAnimationToEnd
# Should return to pending-payment screen gracefully (no crash)
- extendedWaitUntil:
    visible:
      text: "Pending Payment"
    timeout: 10000

# Navigate back to promotions
- tapOn: "Save for Later"
- assertVisible: "Promotions"

- runFlow: ../subflows/logout.yaml

# ── MANUAL TEST NOTES (cannot be automated in Maestro) ───────────────────────
# 1. Cancel path: In Stripe Checkout, tap "Cancel" / "< Back" link.
#    Expected: Returns to pending-payment with no status change. No "Awaiting Review".
# 2. Success path: Complete payment with card 4242 4242 4242 4242, exp 12/30, CVC 123.
#    Expected: Redirected to unit://promotions?status=success.
#    App shows "Awaiting Review" header and "Payment received" toast.
#    Covered by m5-02-tenant-paid-promotion.yaml (tagged stripe).

appId: ${MAESTRO_APP_ID}
---
# Reusable subflow: log in as Tenant 1
# Precondition: app launched, waiting for login screen
# Postcondition: app is on Home tab (US-002 made Home the default for tenants)
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 60000
- tapOn:
    id: "login-email"
- eraseText: 100
- inputText: "tenant1@unit-test.com"
- tapOn:
    id: "login-password"
- eraseText: 100
- inputText: "admin123"
- tapOn:
    id: "login-logo"
- scrollUntilVisible:
    element:
      id: "btn-login-submit"
    direction: DOWN
- tapOn:
    id: "btn-login-submit"
# US-002 made Home the default tab for tenants. "My Property" is the home
# segment toggle — unique to that screen and always rendered post-login.
- extendedWaitUntil:
    visible:
      text: "My Property"
    timeout: 15000

appId: com.unitapp.mobile
---
# Reusable subflow: log in as Tenant 1
# Precondition: app launched, waiting for login screen
# Postcondition: app is on Directory tab
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 60000
- tapOn:
    label: "Email"
- inputText: "tenant1@unit-test.com"
- tapOn:
    label: "Password"
- inputText: "admin123"
- tapOn: "Log In"
- extendedWaitUntil:
    visible:
      text: "Directory"
    timeout: 15000

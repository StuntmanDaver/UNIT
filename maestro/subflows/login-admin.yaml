appId: com.unitapp.mobile
---
# Reusable subflow: log in as admin
# Precondition: app launched, waiting for login screen
# Postcondition: app is on Admin Dashboard with property selector visible
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 60000
- tapOn:
    id: "login-email"
- setClipboard: "david@cultrhealth.com"
- pasteText
- tapOn:
    id: "login-password"
- setClipboard: "admin123"
- pasteText
- tapOn: "Log In"
- extendedWaitUntil:
    visible:
      text: "Admin Dashboard"
    timeout: 15000

appId: ${MAESTRO_APP_ID}
---
# Reusable subflow: log in as admin
# Precondition: app launched, waiting for login screen
# Postcondition: app is on Admin Dashboard with property selector visible
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
      - tapOn: "Close"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 60000
- tapOn:
    id: "login-email"
- eraseText: 100
- inputText: "admin@unit-test.com"
- pressKey: Enter
- waitForAnimationToEnd
- tapOn:
    id: "login-password"
- inputText: "admin123"
- tapOn:
    id: "login-logo"
- scrollUntilVisible:
    element:
      id: "btn-login-submit"
    direction: DOWN
- tapOn:
    id: "btn-login-submit"
- extendedWaitUntil:
    visible:
      text: "Admin Dashboard"
    timeout: 30000
- extendedWaitUntil:
    visible:
      text: "Manage Promotions"
    timeout: 30000

appId: com.unitapp.mobile
---
# Reusable subflow: log out from tenant profile tab
# Precondition: logged in as tenant, on any tab
# Postcondition: app is on login screen
- tapOn:
    id: "tab-profile"
- runFlow:
    when:
      notVisible: "Profile"
    commands:
      - tapOn:
          point: "92%,93%"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      text: "Profile"
    timeout: 8000
- extendedWaitUntil:
    visible:
      text: "Log Out"
    timeout: 8000
- tapOn: "Log Out"
# Confirm the alert. Use index: 1 — the profile-page 'Log Out' button occupies
# index 0 in the accessibility tree even behind the modal, so index: 1 targets
# the alert action button reliably.
- assertVisible: "Are you sure you want to log out?"
- tapOn:
    text: "Log Out"
    index: 1
- extendedWaitUntil:
    visible:
      text: "Log In"
    timeout: 15000

appId: ${MAESTRO_APP_ID}
name: Profile Edit Flow
---
- launchApp
- tapOn:
    id: "tab-profile"
- assertVisible: "Profile"
- tapOn: "Edit Profile"
- assertVisible: "Edit Profile"
- tapOn: "Business Name"
- eraseText: 100
- inputText: "Updated Business Name"
- tapOn: "Save Changes"
- assertVisible: "Profile updated"

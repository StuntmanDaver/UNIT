name: E2E (Maestro — iOS Simulator)

# Full E2E suite is expensive (macOS runner + Simulator boot + Metro).
# Run on-demand via workflow_dispatch, or automatically on releases.
#
# DO NOT run on every push/PR — use the existing ci.yml (TypeScript + Jest)
# for per-commit checks.
on:
  workflow_dispatch:
    inputs:
      flow:
        description: "Flow file to run (relative to maestro/flows/). Leave blank for full suite."
        required: false
        default: "qa-00-full-suite.yaml"
      exclude_tags:
        description: "Comma-separated tags to exclude (e.g. stripe,manual)"
        required: false
        default: "stripe"
  # Uncomment to auto-run on release branches:
  # push:
  #   branches: [release/**]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Maestro E2E — iOS
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Java 21 (required by Maestro CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Maestro CLI
        run: |
          export MAESTRO_VERSION=1.40.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Boot iPhone 16 Pro Max Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available --json \
            | jq -r '.devices | to_entries[] | .value[] | select(.name == "iPhone 16 Pro Max") | .udid' \
            | head -1)
          echo "SIMULATOR_UDID=$DEVICE_ID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_ID" || true
          open -a Simulator --args -CurrentDeviceUDID "$DEVICE_ID"
          # Wait for simulator to be ready
          sleep 20

      - name: Install Expo Dev Client on Simulator
        # Requires a pre-built .app artifact stored in GitHub Releases or S3.
        # Replace this step with your actual app installation method.
        run: |
          echo "SKIP: Install app from artifact or pre-built .app"
          # Example:
          # xcrun simctl install booted path/to/UNITApp.app
        # TODO: Upload dev build to GitHub Releases and download here

      - name: Start Metro Bundler (background)
        run: |
          npx expo start --ios --non-interactive &
          echo "METRO_PID=$!" >> $GITHUB_ENV
          # Wait for Metro to be ready
          sleep 30

      - name: Seed E2E test data
        # Apply seed SQL via Supabase CLI or REST API
        # Requires SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "Seed step: Apply seed-e2e-test-data.sql via psql or Supabase REST"
          # Example with psql:
          # psql "${{ secrets.DATABASE_URL }}" -f scripts/seed-e2e-test-data.sql

      - name: Run Maestro E2E
        env:
          MAESTRO_CLI_NO_ANALYTICS: 1
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: |
          FLOW="${{ github.event.inputs.flow || 'qa-00-full-suite.yaml' }}"
          EXCLUDE="${{ github.event.inputs.exclude_tags || 'stripe' }}"

          EXCLUDE_FLAGS=""
          for tag in $(echo "$EXCLUDE" | tr ',' ' '); do
            EXCLUDE_FLAGS="$EXCLUDE_FLAGS --exclude-tags=$tag"
          done

          ~/.maestro/bin/maestro test \
            maestro/flows/$FLOW \
            $EXCLUDE_FLAGS \
            --format JUNIT \
            --output maestro-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results-${{ github.run_number }}
          path: |
            maestro-results.xml
            ~/.maestro/tests/

      - name: Kill Metro
        if: always()
        run: kill $METRO_PID || true

      - name: Publish Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: maestro-results.xml
          check_name: Maestro E2E Results

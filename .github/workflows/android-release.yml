name: Android Release to Google Play Internal

on:
  workflow_dispatch:
    inputs:
      submit:
        description: "Build and submit to the Google Play internal track"
        required: true
        default: true
        type: boolean

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Build and Submit Android
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read

    env:
      APP_VARIANT: production
      EXPO_PUBLIC_ENV: production
      EXPO_PUBLIC_APP_URL: unit://
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SUPPORT_EMAIL: ${{ secrets.EXPO_PUBLIC_SUPPORT_EMAIL }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write Google Play service account key
        run: |
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > google-play-key.json
          node -e "const fs=require('fs'); const key=JSON.parse(fs.readFileSync('google-play-key.json','utf8')); if (key.type !== 'service_account' || !key.client_email || !key.private_key) throw new Error('Invalid Google Play service account JSON');"
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Release checks
        run: npm run release:check

      - name: Google Play preflight
        run: npm run release:android:preflight

      - name: Build and submit to Google Play internal
        if: ${{ inputs.submit }}
        run: eas build --platform android --profile production --auto-submit --non-interactive --wait

      - name: Build Android without submit
        if: ${{ !inputs.submit }}
        run: eas build --platform android --profile production --non-interactive --wait

      - name: Show latest Android builds
        if: always()
        run: eas build:list --platform android --limit 3 --non-interactive

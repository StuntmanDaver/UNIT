name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Apply migrations and deploy Edge Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify Edge Function coverage
        run: npm run edge:guard

      - name: Type-check Edge Functions
        run: npm run edge:check

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            MOBILE_APP_URL="${{ secrets.MOBILE_APP_URL }}" \
            SENTRY_DSN="${{ secrets.SENTRY_DSN }}" \
            APP_ENV="${{ secrets.APP_ENV }}" \
            EXPO_ACCESS_TOKEN="${{ secrets.EXPO_ACCESS_TOKEN }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            RESEND_FROM_EMAIL="${{ secrets.RESEND_FROM_EMAIL }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy add-property-to-admin
          supabase functions deploy complete-onboarding
          supabase functions deploy complete-password-reset
          supabase functions deploy create-promotion-checkout-session
          supabase functions deploy delete-account
          supabase functions deploy expire-promotions
          supabase functions deploy invite-tenant
          supabase functions deploy issue-refund
          supabase functions deploy mark-escalated-requests
          supabase functions deploy mark-overdue-invoices
          supabase functions deploy send-escalation-email
          supabase functions deploy send-invoice-email
          supabase functions deploy send-push-notification
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
